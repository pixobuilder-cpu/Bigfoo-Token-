<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigfoot Token - Safe App</title>
    <!-- Version stable du SDK Safe -->
    <script src="https://unpkg.com/@safe-global/safe-apps-sdk@8.1.0/dist/safe-apps-sdk.min.js"></script>
</head>
<body>
    <div style="text-align: center; font-family: system-ui, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto;">
        <h1>🐾 Bigfoot Token (BFT)</h1>
        <p>Interface de Gouvernance sur Polygon</p>
        <hr>
        <div id="safe-status" style="padding: 20px;">
            ⏳ Connexion au Safe en cours...
        </div>
        <div id="safe-info" style="font-size: 12px; color: #666;"></div>
        <div id="error-info" style="color: red; font-size: 12px;"></div>
    </div>

    <script>
        // Attendre que le DOM soit chargé
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM chargé, tentative d'initialisation Safe SDK");
            
            // Vérifier si le SDK est disponible
            if (typeof window.SafeAppsSDK === 'undefined') {
                console.error("SafeAppsSDK non trouvé - vérifiez l'URL du script");
                document.getElementById('safe-status').innerHTML = '❌ SDK Safe non chargé';
                document.getElementById('error-info').innerHTML = 'Erreur: Le SDK Safe n\'a pas pu être chargé. Vérifiez votre connexion internet.';
                return;
            }
            
            try {
                // Initialiser le SDK
                const sdk = new window.SafeAppsSDK.default();
                console.log("SDK initialisé avec succès");
                
                // Récupérer les informations du Safe
                sdk.safe.getInfo()
                    .then(safeInfo => {
                        console.log("Info Safe reçue:", safeInfo);
                        document.getElementById('safe-status').innerHTML = '✅ Connecté au Safe';
                        document.getElementById('safe-info').innerHTML = `
                            📍 <strong>Address:</strong> ${safeInfo.safeAddress}<br>
                            🌐 <strong>Network:</strong> ${safeInfo.chainId === '137' ? 'Polygon' : safeInfo.chainId}<br>
                            🔐 <strong>Threshold:</strong> ${safeInfo.threshold}/${safeInfo.owners.length} owners
                        `;
                    })
                    .catch(err => {
                        console.error("Erreur getInfo:", err);
                        document.getElementById('safe-status').innerHTML = '⚠️ Erreur de connexion';
                        document.getElementById('error-info').innerHTML = `Erreur: ${err.message}`;
                    });
                    
            } catch (err) {
                console.error("Erreur d'initialisation:", err);
                document.getElementById('safe-status').innerHTML = '❌ Erreur d\'initialisation';
                document.getElementById('error-info').innerHTML = `Erreur: ${err.message}`;
            }
        });
    </script>
</body>
</html>
