<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigfoot Token</title>
    <!-- CE LIEN DOIT ÊTRE COMPLET COMME CECI -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <div style="text-align: center; font-family: sans-serif; padding: 20px;">
        <h1>BFT Bigfoot Token </h1>
        <p>Interface de Gouvernance sur Polygon</p>
        <hr>
        <p id="safe-status">Connexion au Safe en cours...</p>
    </div>

    <script>
        const opts = {
            allowedDomains: [/gnosis-safe.io$/, /app.safe.global$/],
        };
        // Initialisation du SDK pour que le bouton Safe devienne BLEU
        const sdk = new window.SafeAppsSDK.default(opts);
        
        sdk.safe.getInfo().then((info) => {
            document.getElementById('safe-status').innerText = "Connecté au Safe : " + info.safeAddress;
        }).catch(err => {
            document.getElementById('safe-status').innerText = "Veuillez ouvrir cette page DEPUIS l'interface Safe.";
        });
    </script>
</body>
</html>
